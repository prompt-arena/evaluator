# 🔴 Authoritative evaluation workflow (ADR 0001 + ADR 0002). Lives ONLY in the trusted, founder-write-only
# prompt-arena/evaluator repo. Backend-dispatched via workflow_dispatch. Secrets are Actions secrets HERE —
# never inputs, never in the challenge repo, never in the platform monorepo.
#
# Trust stages (J3-T02 + App-mint hardening):
#   prepare — mint short-lived App installation tokens → workspace + hidden fetch; never runs participant code;
#             encrypts artifact. ⛔ No long-lived WORKSPACE_READ_TOKEN / HIDDEN_TESTS_TOKEN PATs.
#   execute — decrypt (step-scoped wrap secret) → build/tests/quality; no job-level secrets; no HMAC / App creds
#   submit  — HMAC + callback only; never downloads participant code or hidden tests; no App creds
name: evaluate

on:
  workflow_dispatch:
    inputs:
      submissionId:
        description: Backend submission id (GUID)
        required: true
      participantRepo:
        description: Workspace repo as owner/name (must be promptarena-workspaces/…)
        required: true
      commitSha:
        description: Exact commit to evaluate
        required: true
      challengeSlug:
        description: Challenge slug (selects the integrity manifest)
        required: true
      challengeVersion:
        description: Challenge version number (bound into signed callback)
        required: false
        default: "1"

concurrency:
  group: eval-${{ github.event.inputs.submissionId }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout evaluator (scripts + manifests)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Resolve + allowlist workspace repo
        id: workspace
        run: |
          set -euo pipefail
          full="${{ github.event.inputs.participantRepo }}"
          owner="${full%%/*}"
          name="${full#*/}"
          if [[ "$full" != */* ]] || [[ -z "$owner" ]] || [[ -z "$name" ]] || [[ "$name" == *"/"* ]]; then
            echo "prepare: participantRepo must be owner/name" >&2
            exit 1
          fi
          if [[ "$owner" != "promptarena-workspaces" ]]; then
            echo "prepare: workspace owner must be promptarena-workspaces (got ${owner})" >&2
            exit 1
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      # Dedicated evaluator App (Contents:read + Metadata:read only). SHA-pinned.
      # https://github.com/actions/create-github-app-token/releases/tag/v3.2.0
      - name: Mint workspace installation token
        id: workspace-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.EVALUATOR_APP_CLIENT_ID }}
          private-key: ${{ secrets.EVALUATOR_APP_PRIVATE_KEY }}
          owner: promptarena-workspaces
          repositories: ${{ steps.workspace.outputs.name }}

      - name: Checkout workspace commit (App token; no credential persistence)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ github.event.inputs.participantRepo }}
          ref: ${{ github.event.inputs.commitSha }}
          path: work
          persist-credentials: false
          token: ${{ steps.workspace-app-token.outputs.token }}

      - name: Resolve + allowlist hidden repo
        id: hidden
        run: |
          set -euo pipefail
          slug="${{ github.event.inputs.challengeSlug }}"
          manifest="challenges/${slug}/manifest.json"
          if [[ ! -f "$manifest" ]]; then
            echo "prepare: unknown challenge manifest: ${manifest}" >&2
            exit 1
          fi
          full="$(jq -r '.hiddenRepo' "$manifest")"
          owner="${full%%/*}"
          name="${full#*/}"
          if [[ "$full" != */* ]] || [[ -z "$owner" ]] || [[ -z "$name" ]] || [[ "$name" == *"/"* ]]; then
            echo "prepare: hiddenRepo must be owner/name" >&2
            exit 1
          fi
          if [[ "$owner" != "prompt-arena" ]]; then
            echo "prepare: hidden owner must be prompt-arena (got ${owner})" >&2
            exit 1
          fi
          if [[ "$name" != hidden-* ]]; then
            echo "prepare: hidden repo name must start with hidden-" >&2
            exit 1
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "full=${full}" >> "$GITHUB_OUTPUT"

      - name: Mint hidden-tests installation token
        id: hidden-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.EVALUATOR_APP_CLIENT_ID }}
          private-key: ${{ secrets.EVALUATOR_APP_PRIVATE_KEY }}
          owner: prompt-arena
          repositories: ${{ steps.hidden.outputs.name }}

      - name: Prepare artifact (no participant code execution)
        env:
          # Step-scoped only — never job outputs; never passed to execute/submit.
          HIDDEN_INSTALLATION_TOKEN: ${{ steps.hidden-app-token.outputs.token }}
          PREPARE_WRAP_SECRET: ${{ secrets.PREPARE_WRAP_SECRET }}
          SUBMISSION_ID: ${{ github.event.inputs.submissionId }}
          COMMIT_SHA: ${{ github.event.inputs.commitSha }}
          CHALLENGE_SLUG: ${{ github.event.inputs.challengeSlug }}
          CHALLENGE_VERSION: ${{ github.event.inputs.challengeVersion }}
          WORKSPACE_REPO: ${{ github.event.inputs.participantRepo }}
        run: |
          set -euo pipefail
          chmod +x .eval/*.sh
          .eval/prepare.sh
          # Drop token from this shell after prepare (defense in depth; step env dies with the step).
          unset HIDDEN_INSTALLATION_TOKEN

      - name: Upload encrypted prepared blob
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: prepared-enc
          path: prepared.tar.gz.enc
          if-no-files-found: error
          retention-days: 1

  execute:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 🔴 No job-level secrets. Wrap secret is step-scoped to decrypt only.
    # 🔴 No App private key, installation tokens, HMAC secret, or backend URL here.
    steps:
      - name: Checkout evaluator (trusted scripts only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download prepared blob
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: prepared-enc
          path: .

      - name: Decrypt prepared work (secrets end after this step)
        env:
          PREPARE_WRAP_SECRET: ${{ secrets.PREPARE_WRAP_SECRET }}
        run: |
          chmod +x .eval/*.sh
          .eval/unwrap_prepared.sh prepared.tar.gz.enc
          unset PREPARE_WRAP_SECRET

      - name: Assert execute env has no eval secrets
        run: .eval/assert_execute_env.sh

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"

      - name: Evaluate (participant code — no secrets)
        run: |
          MANIFEST="challenges/$(jq -r .challengeSlug meta.json)/manifest.json"
          .eval/run.sh work "$MANIFEST" > components.json
          jq '{integrity, build, tests}' components.json

      - name: Scrub hidden material
        if: always()
        run: rm -rf work/tests/hidden prepared.tar.gz prepared.tar.gz.enc || true

      - name: Upload components only
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: components
          path: |
            components.json
            meta.json
          if-no-files-found: error
          retention-days: 1

  submit:
    needs: execute
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 🔴 HMAC callback secret + backend URL only — no App credentials / installation tokens / wrap secret.
    steps:
      - name: Checkout evaluator (submit script only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download components
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: components
          path: .

      - name: Assert submit env has no App / fetch credentials
        run: |
          chmod +x .eval/*.sh
          .eval/assert_submit_env.sh

      - name: Sign + submit score
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x .eval/*.sh
          export SUBMISSION_ID="$(jq -r .submissionId meta.json)"
          export COMMIT_SHA="$(jq -r .commitSha meta.json)"
          export WORKSPACE_REPO="$(jq -r .workspaceRepo meta.json)"
          export CHALLENGE_VERSION="$(jq -r .challengeVersion meta.json)"
          if [[ -d work ]] || [[ -d tests/hidden ]]; then
            echo "submit: refusing — participant/hidden tree present" >&2
            exit 1
          fi
          .eval/submit.sh components.json
