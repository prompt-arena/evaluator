# 🔴 Authoritative evaluation workflow (ADR 0001 + ADR 0002). Lives ONLY in the trusted, founder-write-only
# prompt-arena/evaluator repo. Backend-dispatched via workflow_dispatch. Secrets are Actions secrets HERE —
# never inputs, never in the challenge repo, never in the platform monorepo.
#
# Trust stages (J3-T02):
#   prepare — workspace + hidden fetch (secrets); never runs participant code; encrypts artifact
#   execute — decrypt (step-scoped wrap secret) → build/tests/quality; no job-level secrets; no HMAC secret
#   submit  — HMAC + callback only; never downloads participant code or hidden tests
name: evaluate

on:
  workflow_dispatch:
    inputs:
      submissionId:
        description: Backend submission id (GUID)
        required: true
      participantRepo:
        description: Workspace (or participant) repo as owner/name
        required: true
      commitSha:
        description: Exact commit to evaluate
        required: true
      challengeSlug:
        description: Challenge slug (selects the integrity manifest)
        required: true
      challengeVersion:
        description: Challenge version number (bound into signed callback)
        required: false
        default: "1"

concurrency:
  group: eval-${{ github.event.inputs.submissionId }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout evaluator (scripts + manifests)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout workspace commit (authenticated)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ github.event.inputs.participantRepo }}
          ref: ${{ github.event.inputs.commitSha }}
          path: work
          persist-credentials: false
          token: ${{ secrets.WORKSPACE_READ_TOKEN }}

      - name: Prepare artifact (no participant code execution)
        env:
          HIDDEN_TESTS_TOKEN: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          PREPARE_WRAP_SECRET: ${{ secrets.PREPARE_WRAP_SECRET }}
          SUBMISSION_ID: ${{ github.event.inputs.submissionId }}
          COMMIT_SHA: ${{ github.event.inputs.commitSha }}
          CHALLENGE_SLUG: ${{ github.event.inputs.challengeSlug }}
          CHALLENGE_VERSION: ${{ github.event.inputs.challengeVersion }}
          WORKSPACE_REPO: ${{ github.event.inputs.participantRepo }}
        run: |
          chmod +x .eval/*.sh
          .eval/prepare.sh

      - name: Upload encrypted prepared blob
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: prepared-enc
          path: prepared.tar.gz.enc
          if-no-files-found: error
          retention-days: 1

  execute:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 🔴 No job-level secrets. PREPARE_WRAP_SECRET is step-scoped to decrypt only.
    steps:
      - name: Checkout evaluator (trusted scripts only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download prepared blob
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: prepared-enc
          path: .

      - name: Decrypt prepared work (secrets end after this step)
        env:
          PREPARE_WRAP_SECRET: ${{ secrets.PREPARE_WRAP_SECRET }}
        run: |
          chmod +x .eval/*.sh
          .eval/unwrap_prepared.sh prepared.tar.gz.enc
          unset PREPARE_WRAP_SECRET

      - name: Assert execute env has no eval secrets
        run: .eval/assert_execute_env.sh

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"

      - name: Evaluate (participant code — no secrets)
        run: |
          MANIFEST="challenges/$(jq -r .challengeSlug meta.json)/manifest.json"
          .eval/run.sh work "$MANIFEST" > components.json
          jq '{integrity, build, tests}' components.json

      - name: Scrub hidden material
        if: always()
        run: rm -rf work/tests/hidden prepared.tar.gz prepared.tar.gz.enc || true

      - name: Upload components only
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: components
          path: |
            components.json
            meta.json
          if-no-files-found: error
          retention-days: 1

  submit:
    needs: execute
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout evaluator (submit script only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download components
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: components
          path: .

      - name: Sign + submit score
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x .eval/*.sh
          export SUBMISSION_ID="$(jq -r .submissionId meta.json)"
          export COMMIT_SHA="$(jq -r .commitSha meta.json)"
          export WORKSPACE_REPO="$(jq -r .workspaceRepo meta.json)"
          export CHALLENGE_VERSION="$(jq -r .challengeVersion meta.json)"
          if [[ -d work ]] || [[ -d tests/hidden ]]; then
            echo "submit: refusing — participant/hidden tree present" >&2
            exit 1
          fi
          .eval/submit.sh components.json
